name: Build and Release Zygisk Module

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cpp/**'
      - 'common/**'
      - 'webroot/**'
      - 'module.prop'
      - 'release.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract Metadata
      id: metadata
      run: |
        # Read from release.json (like AshLooper)
        VERSION=$(jq -r '.version' release.json)
        VERSION_CODE=$(jq -r '.versionCode' release.json)
        COMMIT_MSG=$(git log -1 --pretty=%B)

        echo "tag=$VERSION" >> $GITHUB_OUTPUT
        echo "filename=GameUnlocker_$VERSION.zip" >> $GITHUB_OUTPUT
        
        # Simple changelog from commit
        echo "$COMMIT_MSG" > release_msg.txt
        echo "body_file=release_msg.txt" >> $GITHUB_OUTPUT

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c

    - name: Build Zygisk Libraries (armeabi-v7a)
      run: |
        mkdir -p build/armeabi-v7a
        cd build/armeabi-v7a
        cmake ../../cpp \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        make
        mkdir -p ../../zygisk/armeabi-v7a
        cp libgameunlocker.so ../../zygisk/armeabi-v7a/libgameunlocker.so       

    - name: Build Zygisk Libraries (arm64-v8a)
      run: |
        mkdir -p build/arm64-v8a
        cd build/arm64-v8a
        cmake ../../cpp \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        make
        mkdir -p ../../zygisk/arm64-v8a/
        cp libgameunlocker.so ../../zygisk/arm64-v8a/libgameunlocker.so

    - name: Package Magisk Module
      run: |
        zip -r9 ${{ steps.metadata.outputs.filename }} \
          META-INF \
          common \
          zygisk \
          customize.sh \
          module.prop \
          README.md \
          webroot \
          release.json

    - name: Check for Edit and Append Footer
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.metadata.outputs.tag }}"
        BODY_FILE="${{ steps.metadata.outputs.body_file }}"

        # If release already exists, we will update it cleanly without spam
        if gh release view "$TAG" > /dev/null 2>&1; then
          NOW_DATE=$(date +'%Y-%m-%d')
          NOW_TIME=$(date +'%H:%M:%S')
          echo "" >> "$BODY_FILE"
          echo "- Edited: Date: $NOW_DATE Time: $NOW_TIME" >> "$BODY_FILE"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameUnlocker_Artifact
        path: ${{ steps.metadata.outputs.filename }}

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.metadata.outputs.tag }}
        name: GameUnlocker ${{ steps.metadata.outputs.tag }}
        body_path: ${{ steps.metadata.outputs.body_file }}
        files: ${{ steps.metadata.outputs.filename }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
